version: '3.8'

services:
  # Databases
  postgres:
    image: postgres:15-alpine
    container_name: news_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-news_ai}
      POSTGRES_USER: ${POSTGRES_USER:-news_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-news_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/migrate.sql:/docker-entrypoint-initdb.d/migrate.sql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-news_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: news_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: news_qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Core Services
  nlp_service:
    build:
      context: ./services/nlp_py
      dockerfile: Dockerfile
    container_name: news_nlp
    ports:
      - "${NLP_PORT:-8081}:8081"
    environment:
      - NLP_HOST=0.0.0.0
      - NLP_PORT=8081
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - QDRANT_HOST=qdrant
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./services/nlp_py:/app
      - model_cache:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  api_gateway:
    build:
      context: ./services/api_go
      dockerfile: Dockerfile
    container_name: news_api
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8080
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - QDRANT_HOST=qdrant
      - NLP_SERVICE_HOST=nlp_service
      - NLP_SERVICE_PORT=8081
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nlp_service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ingester:
    build:
      context: ./services/ingester_go
      dockerfile: Dockerfile
    container_name: news_ingester
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - INGESTER_INTERVAL=${INGESTER_INTERVAL:-300}
      - INGESTER_CONCURRENT_FEEDS=${INGESTER_CONCURRENT_FEEDS:-50}
      - INGESTER_TIMEOUT=${INGESTER_TIMEOUT:-30}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./data/feeds.json:/app/feeds.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: news_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${API_PORT:-8080}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
    depends_on:
      - api_gateway
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  # Monitoring (Optional)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: news_jaeger
    ports:
      - "16686:16686"
      - "14268:14268"
    environment:
      - COLLECTOR_OTLP_ENABLED=true

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  model_cache: 